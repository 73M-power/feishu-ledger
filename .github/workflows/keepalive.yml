name: keep-feishu-ledger-awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping keep-alive endpoint
        env:
          FEISHU_LEDGER_URL: ${{ vars.FEISHU_LEDGER_URL }}
        run: |
          if [ -z "$FEISHU_LEDGER_URL" ]; then
            echo "Set repository variable FEISHU_LEDGER_URL, for example https://feishu-ledger.onrender.com"
            exit 0
          fi
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
              "$FEISHU_LEDGER_URL/api/ping" || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 20
          done
          echo "keep-alive ping did not get 200"
          exit 0